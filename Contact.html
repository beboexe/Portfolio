<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background-color: rgb(5, 22, 78);
      color: white;
      min-height: 100vh;

    }

    .contact {
      max-width: 80vw;
      margin: auto;
      padding: 60px 20px;
      text-align: center;
    }

    .contact h2 {
      font-size: 2rem;
      margin-bottom: 20px;
      color: rgb(178, 111, 240);
    }

    .contact p {
      font-size: 1rem;
      color: gray;
      margin-bottom: 15px;
    }

    .contact-info {
      margin: 20px 0;
    }

    .contact-social {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 20px;
    }

    .contact-social a {
      text-decoration: none;
      color: white;
      border: 1px solid white;
      padding: 8px 12px;
      border-radius: 5px;
      transition: 0.3s;
    }

    .contact-social a:hover {
      background: rgb(102, 129, 217);
    }
  </style>
</head>

<body>
  <section id="contact" class="contact">
    <h2>Contact Me</h2>
    <p>If you’d like to get in touch, feel free to reach out via email or connect on social platforms.</p>

    <div class="contact-info">
      <p><strong>Email:</strong> m.muneeb.exe@gmail.com</p>
      <p><strong>Phone:</strong> +92 325 6183693</p>
    </div>

    <div class="contact-social">
      <!-- <a href="https://linkedin.com/in/muneeb" target="_blank">LinkedIn</a> -->
      <a href="https://github.com/beboexe" target="_blank">GitHub</a>
      <a href="https://www.instagram.com/muneeb_750/" target="_blank">Instagram</a>
    </div>
  </section>

</body>

</html>
